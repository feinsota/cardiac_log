function loadHistory() {
  const btn = document.getElementById('loadBtn');
  const status = document.getElementById('status');
  const count = document.getElementById('count');
  const detail = document.getElementById('detail');

  btn.disabled = true;
  btn.textContent = 'Importing...';
  status.textContent = 'Writing to localStorage...';

  try {
    let existing = {};
    try { existing = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { existing = {}; }

    let weightImported = 0, detailImported = 0, skipped = 0;

    weightHistory.forEach(([date, weight, notes]) => {
      if (existing[date] && existing[date].weightAM) { skipped++; return; }
      if (existing[date]) {
        existing[date].weightAM = String(weight);
        if (notes && !existing[date].notes) existing[date].notes = notes;
        weightImported++;
      } else {
        existing[date] = { weightAM: String(weight), weightPrior: '', edema: '', funcStatus: '', symptoms: [], notes: notes||'', diuretics: [], fluids: [], outputs: [], bms: [], meals: [] };
        weightImported++;
      }
    });

    Object.entries(detailedDays).forEach(([date, day]) => {
      if (existing[date] && existing[date].weightAM && existing[date].meals && existing[date].meals.length > 0) { skipped++; return; }
      existing[date] = day;
      detailImported++;
    });

    localStorage.setItem(STORAGE_KEY, JSON.stringify(existing));

    const total = Object.keys(existing).length;
    const sorted = Object.keys(existing).sort();
    btn.textContent = '✓ Done!';
    btn.classList.add('done');
    btn.disabled = false;
    status.textContent = 'Import complete.';
    count.textContent = `${weightImported} weight-only days + ${detailImported} detailed days imported. ${skipped} skipped (already had data).`;
    detail.textContent = `${total} total days in your log — ${sorted[0]} through ${sorted[sorted.length-1]}.`;

  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Import history';
    status.textContent = 'Error: ' + e.message;
    console.error(e);
  }
}
